<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Arial,sans-serif;
}

body{

    background:linear-gradient(135deg,#0f4c81,#1c92d2,#f2f7ff);

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}

.container{

    width:95%;
    max-width:650px;

    background:#fff;

    border-radius:20px;

    padding:35px;

    box-shadow:0 15px 40px rgba(0,0,0,.2);

}

.logo{

    text-align:center;

    font-size:65px;

}

.title{

    text-align:center;

    color:#0f4c81;

    font-size:30px;

    font-weight:bold;

    margin-top:10px;

}

.subtitle{

    text-align:center;

    color:#666;

    margin-bottom:30px;

}

label{

    font-weight:bold;

    color:#333;

}

input{

    width:100%;

    padding:15px;

    margin-top:10px;

    margin-bottom:20px;

    border-radius:10px;

    border:1px solid #ddd;

    font-size:17px;

}

textarea{

    width:100%;

    height:130px;

    padding:15px;

    border-radius:10px;

    border:1px solid #ddd;

    resize:none;

    font-size:16px;

}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#0f4c81;

    color:#fff;

    font-size:18px;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#083d66;

}

.emoji-box{

    display:flex;

    justify-content:space-between;

    margin:25px 0;

}

.emoji{

    font-size:55px;

    cursor:pointer;

    transition:.3s;

    border-radius:50%;

    padding:10px;

}

.emoji:hover{

    transform:scale(1.30);

}

.selected{

    transform:scale(1.45);

    background:#ffe066;

    box-shadow:0 0 20px #ffd43b;

}

.message{

    background:#eef8ff;

    border-left:6px solid #0f4c81;

    padding:15px;

    margin-top:25px;

    border-radius:8px;

    color:#333;

    line-height:1.8;

}

.customer{

    text-align:center;

    color:#28a745;

    font-size:22px;

    margin-bottom:20px;

    font-weight:bold;

}

.hide{

    display:none;

}

.thankyou{

    text-align:center;

    padding:50px;

}

.thankyou h1{

    color:#28a745;

    font-size:45px;

}

.thankyou h2{

    color:#333;

    margin-top:20px;

}

.footer{

    text-align:center;

    margin-top:20px;

    color:#777;

    font-size:14px;

}

@media(max-width:600px){

.container{

    padding:20px;

}

.emoji{

    font-size:42px;

}

.title{

    font-size:24px;

}

}

</style>
